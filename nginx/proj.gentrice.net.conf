server {
    listen 443 ssl;
    server_name proj.gentrice.net;

    ssl_certificate     /etc/nginx/ssl/proj.gentrice.net.crt;
    ssl_certificate_key /etc/nginx/ssl/proj.gentrice.net.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # LINE Webhook 需要較大的 body size（批量事件）
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # 傳遞原始 headers（LINE 簽章驗證需要）
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE 支援（LINE events SSE 端點需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE 不要 buffer
        proxy_buffering off;
        proxy_cache off;

        # 長連線超時（SSE 需要）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
